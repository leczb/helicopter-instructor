name: Test and Publish Release

on:
  push:
    # Runs tests on regular commits to the `main` branch
    branches: [main]
    # Runs tests and triggers release packaging on version tags
    tags:
      - "v*"
  pull_request:
    # Runs tests on pull requests targeting the `main` branch

jobs:
  # JOB 1: Test Phase
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Matches X-Plane 12 / XPPython3 v4 native environment
          python-version: "3.12"

      - name: Run unit tests
        run: |
          python3 -m unittest discover v2/tests

  # JOB 2: Packaging and Deployment Phase
  deploy:
    runs-on: ubuntu-latest
    # Prevent execution if the 'test' job fails
    needs: test
    # Strictly limit releases to version tags
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Set up PythonPlugins directory structure
        run: |
          # 1. Create a temporary staging folder matching the X-Plane requirement
          mkdir -p staging/PythonPlugins

          # 2. Copy plugin files into PythonPlugins/
          cp v2/plugin/PI_helicopter_instructor.py staging/PythonPlugins/
          cp -r v2/plugin/helicopter_instructor staging/PythonPlugins/

          # 3. Bundle user docs at the ZIP root for easy discovery
          cp v2/README.md staging/README.md
          cp v2/docs/release_notes.md staging/RELEASE_NOTES.md
          cp CONTRIBUTING.md staging/CONTRIBUTING.md
          cp LICENSE staging/LICENSE

      - name: Zip the plugin
        run: |
          # Zip all staging contents so PythonPlugins/, README.md, and
          # RELEASE_NOTES.md all appear at the top level of the archive
          cd staging
          zip -r ../HelicopterFlightInstructor_Plugin_${{ github.ref_name }}.zip .

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          files: HelicopterFlightInstructor_Plugin_${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
